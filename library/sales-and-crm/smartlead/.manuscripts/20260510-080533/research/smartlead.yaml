openapi: 3.1.0
info:
  title: Smartlead
  version: "1.0"
  description: |
    Smartlead REST API - cold email outreach platform.
    Manage campaigns, leads, sender mailboxes, sequences, master inbox, and deliverability tooling.
  contact:
    name: Smartlead
    url: https://smartlead.ai
servers:
  - url: https://server.smartlead.ai/api/v1
security:
  - apiKeyQuery: []
components:
  securitySchemes:
    apiKeyQuery:
      type: apiKey
      in: query
      name: api_key
      description: API key from Smartlead settings or client API key page
      x-auth-env-vars:
        - SMARTLEAD_API_KEY
  schemas:
    Campaign:
      type: object
      properties:
        id: {type: string}
        name: {type: string}
        status: {type: string}
        client_id: {type: string}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        track_settings: {type: array, items: {type: string}}
        scheduler_cron_value: {type: object, additionalProperties: true}
        min_time_btwn_emails: {type: integer}
        max_leads_per_day: {type: integer}
        stop_lead_settings: {type: string}
    Lead:
      type: object
      properties:
        id: {type: string}
        first_name: {type: string}
        last_name: {type: string}
        email: {type: string}
        phone_number: {type: string}
        company_name: {type: string}
        website: {type: string}
        location: {type: string}
        custom_fields: {type: object, additionalProperties: true}
        linkedin_profile: {type: string}
        company_url: {type: string}
        created_at: {type: string, format: date-time}
    EmailAccount:
      type: object
      properties:
        id: {type: string}
        from_name: {type: string}
        from_email: {type: string}
        username: {type: string}
        smtp_host: {type: string}
        smtp_port: {type: integer}
        imap_host: {type: string}
        imap_port: {type: integer}
        message_per_day: {type: integer}
        is_smtp_success: {type: boolean}
        is_imap_success: {type: boolean}
        warmup_details: {type: object, additionalProperties: true}
    Webhook:
      type: object
      properties:
        id: {type: string}
        name: {type: string}
        webhook_url: {type: string}
        event_types: {type: array, items: {type: string}}
        categories: {type: array, items: {type: string}}
        enabled: {type: boolean}
        created_at: {type: string, format: date-time}
    Client:
      type: object
      properties:
        id: {type: string}
        name: {type: string}
        email: {type: string}
        permission: {type: array, items: {type: string}}
        logo: {type: string}
        logo_url: {type: string}
        uuid: {type: string}
        created_at: {type: string, format: date-time}
    MasterInboxMessage:
      type: object
      properties:
        id: {type: string}
        message_id: {type: string}
        thread_id: {type: string}
        subject: {type: string}
        body: {type: string}
        from: {type: string}
        to: {type: string}
        sent_time: {type: string, format: date-time}
        type: {type: string}
        category: {type: string}
        is_read: {type: boolean}
        campaign_id: {type: string}
        lead_id: {type: string}
    Tag:
      type: object
      properties:
        id: {type: string}
        name: {type: string}
        color: {type: string}
        created_at: {type: string, format: date-time}
    Note:
      type: object
      properties:
        id: {type: string}
        lead_id: {type: string}
        note: {type: string}
        created_by: {type: string}
        created_at: {type: string, format: date-time}
    Task:
      type: object
      properties:
        id: {type: string}
        lead_id: {type: string}
        title: {type: string}
        description: {type: string}
        due_date: {type: string, format: date-time}
        status: {type: string}
        assigned_to: {type: string}
        created_at: {type: string, format: date-time}
    SpamTest:
      type: object
      properties:
        id: {type: string}
        test_id: {type: string}
        name: {type: string}
        status: {type: string}
        type: {type: string}
        score: {type: number}
        inbox_count: {type: integer}
        spam_count: {type: integer}
        created_at: {type: string, format: date-time}
        completed_at: {type: string, format: date-time}
    LooseObject:
      type: object
      additionalProperties: true
paths:
  /campaigns/create:
    post:
      summary: Create campaign
      operationId: createCampaign
      tags: [campaigns]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: {type: string}
                client_id: {type: string}
      responses:
        "200":
          description: Campaign created
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Campaign"}
  /campaigns/:
    get:
      summary: List all campaigns
      operationId: listCampaigns
      tags: [campaigns]
      responses:
        "200":
          description: Campaigns
          content:
            application/json:
              schema:
                type: array
                items: {$ref: "#/components/schemas/Campaign"}
  /campaigns/{id}:
    get:
      summary: Get campaign by ID
      operationId: getCampaign
      tags: [campaigns]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      responses:
        "200":
          description: Campaign
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Campaign"}
    delete:
      summary: Delete campaign
      operationId: deleteCampaign
      tags: [campaigns]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      responses:
        "200": {description: Deleted}
  /campaigns/{id}/status:
    patch:
      summary: Update campaign status
      operationId: updateCampaignStatus
      tags: [campaigns]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: {type: string, enum: [ACTIVE, PAUSED, STOPPED, START]}
      responses:
        "200": {description: Updated, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
  /campaigns/{id}/settings:
    post:
      summary: Update campaign settings
      operationId: updateCampaignSettings
      tags: [campaigns]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object, additionalProperties: true}
      responses:
        "200": {description: Updated, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
  /campaigns/{id}/schedule:
    post:
      summary: Set sending schedule
      operationId: setCampaignSchedule
      tags: [campaigns]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object, additionalProperties: true}
      responses:
        "200": {description: Updated, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
  /campaigns/{id}/sequences:
    post:
      summary: Save sequences
      operationId: saveCampaignSequences
      tags: [campaigns]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sequences]
              properties:
                sequences: {type: array, items: {type: object, additionalProperties: true}}
      responses:
        "200": {description: Saved, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
    get:
      summary: Get sequences
      operationId: getCampaignSequences
      tags: [campaigns]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      responses:
        "200":
          description: Sequences
          content:
            application/json:
              schema:
                type: array
                items: {type: object, additionalProperties: true}
  /campaigns/{id}/send-test-email:
    post:
      summary: Send test email
      operationId: sendCampaignTestEmail
      tags: [campaigns]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object, additionalProperties: true}
      responses:
        "200": {description: Sent, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
  /campaigns/{id}/create-subsequence:
    post:
      summary: Create subsequence
      operationId: createCampaignSubsequence
      tags: [campaigns]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object, additionalProperties: true}
      responses:
        "200": {description: Created, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
  /campaigns/update-lead-email-account:
    post:
      summary: Reassign lead's sending account
      operationId: updateCampaignLeadEmailAccount
      tags: [campaigns]
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object, additionalProperties: true}
      responses:
        "200": {description: Updated, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
  /campaigns/{id}/export:
    get:
      summary: Export campaign data
      operationId: exportCampaign
      tags: [campaigns]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
        - {name: from, in: query, schema: {type: string}}
        - {name: to, in: query, schema: {type: string}}
      responses:
        "200": {description: Export, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
  /campaigns/analytics:
    get:
      summary: Campaigns with analytics
      operationId: listCampaignsWithAnalytics
      tags: [campaigns]
      parameters:
        - {name: client_id, in: query, schema: {type: string}}
        - {name: start_date, in: query, schema: {type: string}}
        - {name: end_date, in: query, schema: {type: string}}
      responses:
        "200": {description: Campaigns with analytics, content: {application/json: {schema: {type: array, items: {type: object, additionalProperties: true}}}}}
  /campaigns/{id}/analytics:
    get:
      summary: Campaign analytics
      operationId: getCampaignAnalytics
      tags: [campaigns]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
        - {name: start_date, in: query, schema: {type: string}}
        - {name: end_date, in: query, schema: {type: string}}
      responses:
        "200": {description: Analytics, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
  /campaigns/{id}/sequence-analytics:
    get:
      summary: Sequence-level analytics
      operationId: getCampaignSequenceAnalytics
      tags: [campaigns]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
        - {name: start_date, in: query, schema: {type: string}}
        - {name: end_date, in: query, schema: {type: string}}
      responses:
        "200": {description: Analytics, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
  /campaigns/by-lead:
    get:
      summary: Campaigns containing a lead
      operationId: listCampaignsByLead
      tags: [campaigns]
      parameters:
        - {name: lead_id, in: query, required: true, schema: {type: string}}
      responses:
        "200": {description: Campaigns, content: {application/json: {schema: {type: array, items: {$ref: "#/components/schemas/Campaign"}}}}}
  /campaigns/all-leads-activities:
    get:
      summary: All leads activities
      operationId: listCampaignAllLeadsActivities
      tags: [campaigns]
      parameters:
        - {name: campaign_id, in: query, schema: {type: string}}
      responses:
        "200": {description: Activities, content: {application/json: {schema: {type: array, items: {type: object, additionalProperties: true}}}}}

  /email-accounts:
    get:
      summary: List email accounts
      operationId: listEmailAccounts
      tags: [email_accounts]
      parameters:
        - {name: offset, in: query, schema: {type: integer}}
        - {name: limit, in: query, schema: {type: integer}}
      responses:
        "200":
          description: Email accounts
          content:
            application/json:
              schema:
                type: array
                items: {$ref: "#/components/schemas/EmailAccount"}
  /email-accounts/save:
    post:
      summary: Add SMTP/IMAP account
      operationId: createEmailAccount
      tags: [email_accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object, additionalProperties: true}
      responses:
        "200": {description: Created, content: {application/json: {schema: {$ref: "#/components/schemas/EmailAccount"}}}}
  /email-accounts/{id}:
    get:
      summary: Get email account
      operationId: getEmailAccount
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      responses:
        "200": {description: Email account, content: {application/json: {schema: {$ref: "#/components/schemas/EmailAccount"}}}}
    post:
      summary: Update email account
      operationId: updateEmailAccount
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object, additionalProperties: true}
      responses:
        "200": {description: Updated, content: {application/json: {schema: {$ref: "#/components/schemas/EmailAccount"}}}}
    delete:
      summary: Delete account
      operationId: deleteEmailAccount
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      responses:
        "200": {description: Deleted}
  /email-accounts/suspend/{id}:
    put:
      summary: Suspend account
      operationId: suspendEmailAccount
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      responses:
        "200": {description: Suspended}
  /email-accounts/unsuspend/{id}:
    delete:
      summary: Unsuspend account
      operationId: unsuspendEmailAccount
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      responses:
        "200": {description: Unsuspended}
  /email-accounts/{id}/warmup:
    post:
      summary: Update warmup
      operationId: updateEmailAccountWarmup
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object, additionalProperties: true}
      responses:
        "200": {description: Updated, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
  /email-accounts/{id}/warmup-stats:
    get:
      summary: Warmup stats
      operationId: getEmailAccountWarmupStats
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
        - {name: start_date, in: query, schema: {type: string}}
        - {name: end_date, in: query, schema: {type: string}}
      responses:
        "200": {description: Stats, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
  /email-accounts/{id}/warmup-status:
    get:
      summary: Warmup status
      operationId: getEmailAccountWarmupStatus
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      responses:
        "200": {description: Status, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
  /email-accounts/{id}/warmup-settings:
    put:
      summary: Update warmup settings
      operationId: updateEmailAccountWarmupSettings
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object, additionalProperties: true}
      responses:
        "200": {description: Updated, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
  /email-accounts/reconnect:
    post:
      summary: Reconnect
      operationId: reconnectEmailAccount
      tags: [email_accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account_id]
              properties:
                account_id: {type: string}
      responses:
        "200": {description: Reconnected, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
  /email-accounts/{id}/test-connection:
    post:
      summary: Test connection
      operationId: testEmailAccountConnection
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      responses:
        "200": {description: Tested, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
  /email-accounts/{id}/health-metrics:
    get:
      summary: Health metrics
      operationId: getEmailAccountHealthMetrics
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
        - {name: start_date, in: query, schema: {type: string}}
        - {name: end_date, in: query, schema: {type: string}}
      responses:
        "200": {description: Metrics, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
  /email-accounts/{id}/sending-limits:
    get:
      summary: Get sending limits
      operationId: getEmailAccountSendingLimits
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      responses:
        "200": {description: Limits, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
    put:
      summary: Update sending limits
      operationId: updateEmailAccountSendingLimits
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object, additionalProperties: true}
      responses:
        "200": {description: Updated, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
  /email-accounts/bulk-update:
    put:
      summary: Bulk update
      operationId: bulkUpdateEmailAccounts
      tags: [email_accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object, additionalProperties: true}
      responses:
        "200": {description: Updated, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
  /email-accounts/{id}/tag:
    post:
      summary: Tag account
      operationId: tagEmailAccount
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tag_ids]
              properties:
                tag_ids: {type: array, items: {type: string}}
      responses:
        "200": {description: Tagged, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
  /email-accounts/tag-mapping:
    post:
      summary: Map tags to emails
      operationId: createEmailAccountTagMapping
      tags: [email_accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emails, tag_ids]
              properties:
                emails: {type: array, items: {type: string}}
                tag_ids: {type: array, items: {type: string}}
      responses:
        "200": {description: Mapped, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
    delete:
      summary: Remove tag mapping
      operationId: deleteEmailAccountTagMapping
      tags: [email_accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emails, tag_ids]
              properties:
                emails: {type: array, items: {type: string}}
                tag_ids: {type: array, items: {type: string}}
      responses:
        "200": {description: Removed}
  /campaigns/{id}/email-accounts:
    get:
      summary: List accounts on campaign
      operationId: listCampaignEmailAccounts
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      responses:
        "200":
          description: Accounts
          content:
            application/json:
              schema:
                type: array
                items: {$ref: "#/components/schemas/EmailAccount"}
    post:
      summary: Link accounts
      operationId: linkCampaignEmailAccounts
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email_account_ids]
              properties:
                email_account_ids: {type: array, items: {type: string}}
      responses:
        "200": {description: Linked, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
    delete:
      summary: Unlink accounts
      operationId: unlinkCampaignEmailAccounts
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object, additionalProperties: true}
      responses:
        "200": {description: Unlinked}
  /campaigns/{id}/email-accounts/{email_account_id}:
    delete:
      summary: Unlink one
      operationId: unlinkCampaignEmailAccount
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
        - {name: email_account_id, in: path, required: true, schema: {type: string}}
      responses:
        "200": {description: Unlinked}
  /campaigns/{id}/email-accounts/bulk:
    post:
      summary: Bulk link accounts to campaign
      operationId: bulkLinkCampaignEmailAccounts
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object, additionalProperties: true}
      responses:
        "200": {description: Linked, content: {application/json: {schema: {$ref: "#/components/schemas/LooseObject"}}}}
    delete:
      summary: Bulk unlink accounts from campaign
      operationId: bulkUnlinkCampaignEmailAccounts
      tags: [email_accounts]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {type: object, additionalProperties: true}
      responses:
        "200": {description: Unlinked}

  /leads:
    get:
      summary: List leads
      operationId: listLeads
      tags: [leads]
      parameters:
        - {name: offset, in: query, schema: {type: integer}}
        - {name: limit, in: query, schema: {type: integer}}
      responses:
        "200":
          description: Leads
          content:
            application/json:
              schema:
                type: array
                items: {$ref: "#/components/schemas/Lead"}
  /leads/by-email:
    get:
      summary: Search lead by email
      operationId: getLeadByEmail
      tags: [leads]
      parameters:
        - {name: email, in: query, required: true, schema: {type: string}}
      responses:
        "200": {description: Lead, content: {application/json: {schema: {$ref: "#/components/schemas/Lead"}}}}
  /leads/categories:
    get:
      summary: Lead categories
      operationId: listLeadCategories
      tags: [leads]
      responses:
        "200": {description: Categories, content: {application/json: {schema: {type: array, items: {type: object, additionalProperties: true}}}}}
  /leads/{lead_id}:
    post:
      summary: Update lead
      operationId: updateLead
      tags: [leads]
      parameters:
        - {name: lead_id, in: path, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
