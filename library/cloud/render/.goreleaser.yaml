version: 2
project_name: render-pp-cli
changelog:
  disable: true
builds:
  - id: render-pp-cli
    main: ./cmd/render-pp-cli
    binary: render-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/cloud/render/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: render-pp-mcp
    main: ./cmd/render-pp-mcp
    binary: render-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: render-pp-cli
    repository:
      owner: giuliano-giacaglia
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Render endpoint, plus diff, drift, cost, audit, and orphan analytics no other Render tool ships."
    install: |
      bin.install "render-pp-cli"
      bin.install "render-pp-mcp"
