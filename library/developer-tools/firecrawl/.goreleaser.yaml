version: 2
project_name: firecrawl-pp-cli
changelog:
  disable: true
builds:
  - id: firecrawl-pp-cli
    main: ./cmd/firecrawl-pp-cli
    binary: firecrawl-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/firecrawl/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: firecrawl-pp-mcp
    main: ./cmd/firecrawl-pp-mcp
    binary: firecrawl-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: firecrawl-pp-cli
    repository:
      owner: hiten-shah
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "API for interacting with Firecrawl services to perform web scraping and crawling tasks."
    install: |
      bin.install "firecrawl-pp-cli"
      bin.install "firecrawl-pp-mcp"
