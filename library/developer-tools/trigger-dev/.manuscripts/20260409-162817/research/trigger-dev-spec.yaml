name: trigger-dev
description: "Trigger.dev management API - background jobs, AI agents, and workflow orchestration"
version: "4.4"
base_url: "https://api.trigger.dev"

auth:
  type: bearer_token
  header: "Authorization"
  env_vars:
    - TRIGGER_SECRET_KEY
    - TRIGGER_DEV_API_KEY

resources:
  runs:
    description: "Task execution runs with status, timing, cost, errors, and metadata"
    endpoints:
      list:
        method: GET
        path: "/api/v1/runs"
        description: "List runs with filtering by status, task, tags, date range"
        params:
          - name: status
            type: string
            description: "Filter by status: QUEUED, EXECUTING, COMPLETED, FAILED, CANCELED, CRASHED"
          - name: taskIdentifier
            type: string
            description: "Filter by task identifier"
          - name: tag
            type: string
            description: "Filter by tag"
          - name: isTest
            type: boolean
            description: "Filter test runs only"
          - name: "page[size]"
            type: int
            default: 25
            description: "Results per page (10-100)"
          - name: "page[after]"
            type: string
            description: "Cursor for forward pagination"
          - name: "filter[createdAt][period]"
            type: string
            description: "Duration filter (e.g., 1d, 7d, 30d)"
        response:
          type: array
          item: Run
        pagination:
          type: cursor
          cursor_field: "page[after]"
      get:
        method: GET
        path: "/api/v3/runs/{runId}"
        description: "Retrieve detailed run with payload, output, attempts, related runs"
        params:
          - name: runId
            type: string
            required: true
            positional: true
            description: "Run identifier (e.g., run_1234)"
        response:
          type: object
          item: Run
      cancel:
        method: POST
        path: "/api/v1/runs/{runId}/cancel"
        description: "Cancel a running or queued run"
        params:
          - name: runId
            type: string
            required: true
            positional: true
            description: "Run ID to cancel"
      replay:
        method: POST
        path: "/api/v1/runs/{runId}/replay"
        description: "Replay a completed or failed run"
        params:
          - name: runId
            type: string
            required: true
            positional: true
            description: "Run ID to replay"
      reschedule:
        method: POST
        path: "/api/v1/runs/{runId}/reschedule"
        description: "Reschedule a delayed run with a new delay"
        params:
          - name: runId
            type: string
            required: true
            positional: true
            description: "Run ID to reschedule"
        body:
          - name: delay
            type: string
            description: "New delay duration (e.g., 1h, 30m)"
      add-tags:
        method: POST
        path: "/api/v1/runs/{runId}/tags"
        description: "Add tags to a run (max 10 tags, 128 chars each)"
        params:
          - name: runId
            type: string
            required: true
            positional: true
            description: "Run ID"
        body:
          - name: tags
            type: array
            description: "Tags to add"
      update-metadata:
        method: PUT
        path: "/api/v1/runs/{runId}/metadata"
        description: "Update run metadata JSON"
        params:
          - name: runId
            type: string
            required: true
            positional: true
            description: "Run ID"
        body:
          - name: metadata
            type: object
            description: "Metadata key-value pairs"

  tasks:
    description: "Trigger tasks with payloads and options"
    endpoints:
      trigger:
        method: POST
        path: "/api/v1/tasks/{taskIdentifier}/trigger"
        description: "Trigger a task with a JSON payload"
        params:
          - name: taskIdentifier
            type: string
            required: true
            positional: true
            description: "Task identifier (e.g., my-task)"
        body:
          - name: payload
            type: object
            description: "Task payload data (JSON)"
          - name: options.queue
            type: string
            description: "Queue name override"
          - name: options.concurrencyKey
            type: string
            description: "Concurrency scope key"
          - name: options.idempotencyKey
            type: string
            description: "Idempotency key to prevent duplicates"
          - name: options.ttl
            type: string
            description: "Time-to-live before removal (e.g., 1h42m)"
          - name: options.delay
            type: string
            description: "Execution delay (e.g., 1h, 30d, or ISO date)"
          - name: options.tags
            type: array
            description: "Run tags (max 10, 128 chars each)"
          - name: options.machine
            type: string
            description: "Machine preset: micro, small-1x, small-2x, medium-1x, medium-2x, large-1x, large-2x"
      batch-trigger:
        method: POST
        path: "/api/v1/tasks/{taskIdentifier}/batch"
        description: "Batch trigger multiple runs of a task"
        params:
          - name: taskIdentifier
            type: string
            required: true
            positional: true
            description: "Task identifier"
        body:
          - name: items
            type: array
            description: "Array of trigger payload objects"

  schedules:
    description: "Cron-based scheduled task execution"
    endpoints:
      list:
        method: GET
        path: "/api/v1/schedules"
        description: "List all schedules"
        response:
          type: array
          item: Schedule
      get:
        method: GET
        path: "/api/v1/schedules/{scheduleId}"
        description: "Retrieve a specific schedule"
        params:
          - name: scheduleId
            type: string
            required: true
            positional: true
            description: "Schedule ID (sched_...)"
        response:
          type: object
          item: Schedule
      create:
        method: POST
        path: "/api/v1/schedules"
        description: "Create a new cron schedule for a task"
        body:
          - name: task
            type: string
            required: true
            description: "Task identifier to trigger"
          - name: cron
            type: string
            required: true
            description: "Cron expression (e.g., 0 0 * * *)"
          - name: deduplicationKey
            type: string
            required: true
            description: "Prevents duplicate schedule creation"
          - name: externalId
            type: string
            description: "Custom identifier for your reference"
          - name: timezone
            type: string
            description: "IANA timezone (e.g., America/New_York), defaults to UTC"
      update:
        method: PUT
        path: "/api/v1/schedules/{scheduleId}"
        description: "Update a schedule's cron, timezone, or external ID"
        params:
          - name: scheduleId
            type: string
            required: true
            positional: true
            description: "Schedule ID"
        body:
          - name: task
            type: string
            description: "Task identifier"
          - name: cron
            type: string
            description: "Cron expression"
          - name: externalId
            type: string
            description: "Custom identifier"
          - name: timezone
            type: string
            description: "IANA timezone"
      delete:
        method: DELETE
        path: "/api/v1/schedules/{scheduleId}"
        description: "Delete a schedule permanently"
        params:
          - name: scheduleId
            type: string
            required: true
            positional: true
            description: "Schedule ID"
      activate:
        method: POST
        path: "/api/v1/schedules/{scheduleId}/activate"
        description: "Activate a paused schedule"
        params:
          - name: scheduleId
            type: string
            required: true
            positional: true
            description: "Schedule ID"
      deactivate:
        method: POST
        path: "/api/v1/schedules/{scheduleId}/deactivate"
        description: "Pause a schedule"
        params:
          - name: scheduleId
            type: string
            required: true
            positional: true
            description: "Schedule ID"
      timezones:
        method: GET
        path: "/api/v1/schedules/timezones"
        description: "List supported IANA timezones"
        response:
          type: array

  envvars:
    description: "Environment variable management across dev, staging, and prod"
    endpoints:
      list:
        method: GET
        path: "/api/v1/projects/{projectRef}/envvars/{env}"
        description: "List environment variables for a project environment"
        params:
          - name: projectRef
            type: string
            required: true
            description: "Project reference (e.g., proj_abc123)"
          - name: env
            type: string
            required: true
            positional: true
            description: "Environment: dev, staging, or prod"
        response:
          type: array
          item: EnvVar
      create:
        method: POST
        path: "/api/v1/projects/{projectRef}/envvars/{env}"
        description: "Create an environment variable"
        params:
          - name: projectRef
            type: string
            required: true
            description: "Project reference"
          - name: env
            type: string
            required: true
            positional: true
            description: "Environment: dev, staging, or prod"
        body:
          - name: name
            type: string
            required: true
            description: "Variable name"
          - name: value
            type: string
            required: true
            description: "Variable value"
      delete:
        method: DELETE
        path: "/api/v1/projects/{projectRef}/envvars/{env}/{name}"
        description: "Delete an environment variable"
        params:
          - name: projectRef
            type: string
            required: true
            description: "Project reference"
          - name: env
            type: string
            required: true
            description: "Environment: dev, staging, or prod"
          - name: name
            type: string
            required: true
            positional: true
            description: "Variable name to delete"
      import:
        method: POST
        path: "/api/v1/projects/{projectRef}/envvars/{env}/import"
        description: "Import environment variables in bulk"
        params:
          - name: projectRef
            type: string
            required: true
            description: "Project reference"
          - name: env
            type: string
            required: true
            positional: true
            description: "Environment: dev, staging, or prod"
        body:
          - name: variables
            type: object
            description: "Key-value pairs of environment variables"
          - name: override
            type: boolean
            description: "Override existing variables (default false)"

  queues:
    description: "Queue management and concurrency control"
    endpoints:
      list:
        method: GET
        path: "/api/v1/queues"
        description: "List all queues with running and queued counts"
        params:
          - name: page
            type: int
            description: "Page number (1-based)"
          - name: perPage
            type: int
            description: "Queues per page"
        response:
          type: array
          item: Queue
      get:
        method: GET
        path: "/api/v1/queues/{queueId}"
        description: "Retrieve a specific queue's details"
        params:
          - name: queueId
            type: string
            required: true
            positional: true
            description: "Queue identifier"
        response:
          type: object
          item: Queue
      pause:
        method: POST
        path: "/api/v1/queues/{queueId}/pause"
        description: "Pause a queue (stops processing new runs)"
        params:
          - name: queueId
            type: string
            required: true
            positional: true
            description: "Queue identifier"
      resume:
        method: POST
        path: "/api/v1/queues/{queueId}/resume"
        description: "Resume a paused queue"
        params:
          - name: queueId
            type: string
            required: true
            positional: true
            description: "Queue identifier"
      override-concurrency:
        method: POST
        path: "/api/v1/queues/{queueId}/concurrency"
        description: "Override the concurrency limit for a queue"
        params:
          - name: queueId
            type: string
            required: true
            positional: true
            description: "Queue identifier"
        body:
          - name: limit
            type: int
            required: true
            description: "New concurrency limit"
      reset-concurrency:
        method: DELETE
        path: "/api/v1/queues/{queueId}/concurrency"
        description: "Reset queue concurrency limit to default"
        params:
          - name: queueId
            type: string
            required: true
            positional: true
            description: "Queue identifier"

  deployments:
    description: "Deployment management and promotion"
    endpoints:
      get:
        method: GET
        path: "/api/v1/deployments/{deploymentId}"
        description: "Get deployment details including tasks and version"
        params:
          - name: deploymentId
            type: string
            required: true
            positional: true
            description: "Deployment ID"
        response:
          type: object
          item: Deployment
      latest:
        method: GET
        path: "/api/v1/deployments/latest"
        description: "Get the most recent deployment"
        response:
          type: object
          item: Deployment
      promote:
        method: POST
        path: "/api/v1/deployments/{deploymentId}/promote"
        description: "Promote a deployment to a target environment"
        params:
          - name: deploymentId
            type: string
            required: true
            positional: true
            description: "Deployment ID to promote"
        body:
          - name: environment
            type: string
            description: "Target environment (staging, prod)"

  batches:
    description: "Batch task triggering and tracking"
    endpoints:
      create:
        method: POST
        path: "/api/v1/batches"
        description: "Create a batch of task triggers"
        body:
          - name: taskIdentifier
            type: string
            required: true
            description: "Task identifier"
          - name: items
            type: array
            required: true
            description: "Array of payload objects"
      get:
        method: GET
        path: "/api/v1/batches/{batchId}"
        description: "Retrieve batch status and item counts"
        params:
          - name: batchId
            type: string
            required: true
            positional: true
            description: "Batch ID"
        response:
          type: object
          item: Batch

  waitpoints:
    description: "Waitpoint tokens for human-in-the-loop approval workflows"
    endpoints:
      list:
        method: GET
        path: "/api/v1/waitpoint-tokens"
        description: "List waitpoint tokens"
        response:
          type: array
          item: WaitpointToken
      get:
        method: GET
        path: "/api/v1/waitpoint-tokens/{tokenId}"
        description: "Retrieve a waitpoint token"
        params:
          - name: tokenId
            type: string
            required: true
            positional: true
            description: "Waitpoint token ID"
        response:
          type: object
          item: WaitpointToken
      create:
        method: POST
        path: "/api/v1/waitpoint-tokens"
        description: "Create a waitpoint token for human approval"
        body:
          - name: tags
            type: array
            description: "Tags for the waitpoint"
          - name: idempotencyKey
            type: string
            description: "Prevent duplicate tokens"
      complete:
        method: POST
        path: "/api/v1/waitpoint-tokens/{tokenId}/complete"
        description: "Complete a waitpoint token with approval output"
        params:
          - name: tokenId
            type: string
            required: true
            positional: true
            description: "Waitpoint token ID"
        body:
          - name: output
            type: object
            description: "Output data to pass to the waiting task"

  query:
    description: "TRQL query execution for run analytics and metrics (ClickHouse-backed)"
    endpoints:
      execute:
        method: POST
        path: "/api/v1/query"
        description: "Execute a TRQL query (SQL-like syntax against runs and metrics tables)"
        body:
          - name: query
            type: string
            required: true
            description: "TRQL query string"
          - name: scope
            type: string
            description: "Query scope: environment, project, or organization (default: environment)"
          - name: period
            type: string
            description: "Time period (e.g., 7d, 30d, 1h)"
          - name: from
            type: string
            description: "ISO 8601 start timestamp"
          - name: to
            type: string
            description: "ISO 8601 end timestamp"
          - name: format
            type: string
            description: "Response format: json or csv (default: json)"
