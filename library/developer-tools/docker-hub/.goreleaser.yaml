version: 2
project_name: docker-hub-pp-cli
changelog:
  disable: true
builds:
  - id: docker-hub-pp-cli
    main: ./cmd/docker-hub-pp-cli
    binary: docker-hub-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X docker-hub-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: docker-hub-pp-mcp
    main: ./cmd/docker-hub-pp-mcp
    binary: docker-hub-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: docker-hub-pp-cli
    repository:
      owner: hiten-shah
      name: homebrew-tap
    homepage: "https://github.com/hiten-shah/docker-hub-pp-cli"
    description: "Docker Hub public API. Search container images, browse tags, check sizes,
inspect Dockerfiles, and explore the world's largest container registry.
No authentication required for public repositories (rate limited to ~18 req/min)."
    install: |
      bin.install "docker-hub-pp-cli"
      bin.install "docker-hub-pp-mcp"
