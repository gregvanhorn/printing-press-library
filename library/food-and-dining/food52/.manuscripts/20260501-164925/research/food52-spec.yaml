name: food52
kind: synthetic
description: "Search, browse, and read Food52 — recipes, articles, and structured ingredients/steps from the Food52 community-curated cookbook, with offline FTS and a local cache."
cli_description: "Search and read Food52 recipes and articles from your terminal — ingredients, steps, ratings, and full article text without leaving the shell."
version: "0.2.0"
base_url: "https://food52.com"
website_url: "https://food52.com"
category: "food-and-dining"
spec_source: sniffed
http_transport: browser-chrome  # Surf+Chrome impersonation; food52.com is on Vercel with passive TLS-fingerprint mitigation that plain HTTP cannot clear.

auth:
  type: none

config:
  format: toml
  path: "~/.config/food52-pp-cli/config.toml"

resources:
  recipes:
    description: "Browse Food52 recipes by tag and fetch single recipe details (extracted from Next.js __NEXT_DATA__ embedded in SSR HTML)"
    endpoints:
      browse:
        method: GET
        path: "/recipes/{tag}"
        description: "Browse Food52 recipes filtered by a tag (e.g. chicken, breakfast, vegetarian)"
        response_format: html
        html_extract:
          mode: embedded-json
          script_selector: "script#__NEXT_DATA__"
          json_path: "props.pageProps.recipesByTag"
        params:
          - name: tag
            type: string
            required: true
            positional: true
            description: "Tag slug (chicken, breakfast, dinner, vegetarian, dessert, pasta, etc.)"
            default: "chicken"
        no_auth: true

      get:
        method: GET
        path: "/recipes/{slug}"
        description: "Get full structured details for a single Food52 recipe by slug"
        response_format: html
        html_extract:
          mode: embedded-json
          script_selector: "script#__NEXT_DATA__"
          json_path: "props.pageProps.recipe"
        params:
          - name: slug
            type: string
            required: true
            positional: true
            description: "Recipe slug from the URL (e.g. mom-s-japanese-curry-chicken-with-radish-and-cauliflower)"
            default: "mom-s-japanese-curry-chicken-with-radish-and-cauliflower"
        no_auth: true

  articles:
    description: "Browse and read Food52 stories (articles) from the food and life verticals"
    endpoints:
      browse:
        method: GET
        path: "/{vertical}"
        description: "Browse the latest Food52 articles in a vertical (food, life)"
        response_format: html
        html_extract:
          mode: embedded-json
          script_selector: "script#__NEXT_DATA__"
          json_path: "props.pageProps.blogPosts"
        params:
          - name: vertical
            type: string
            required: true
            positional: true
            description: "Vertical slug (food, life)"
            default: "food"
        no_auth: true

      get:
        method: GET
        path: "/story/{slug}"
        description: "Get a Food52 article (story) by slug"
        response_format: html
        html_extract:
          mode: embedded-json
          script_selector: "script#__NEXT_DATA__"
          json_path: "props.pageProps.blogPost"
        params:
          - name: slug
            type: string
            required: true
            positional: true
            description: "Article slug from the URL (e.g. best-mothers-day-gift-ideas)"
            default: "best-mothers-day-gift-ideas"
        no_auth: true

extra_commands:
  - name: "recipes search"
    args: "<query>"
    description: "Search Food52 recipes via Typesense (host + search-only key auto-discovered from the public JS bundle)"
  - name: "recipes top"
    args: "<tag>"
    description: "Show only Test-Kitchen-approved recipes for a tag, with an optional rating floor (--min-rating)"
  - name: "articles browse-sub"
    args: "<vertical> <subvertical>"
    description: "Browse a Food52 article subvertical (e.g. food baking, food drinks, life travel)"
  - name: "articles for-recipe"
    args: "<slug>"
    description: "Find synced articles whose relatedReading mentions the given recipe slug"
  - name: "tags list"
    description: "List Food52 recipe tags discovered from the homepage navigation (chicken, breakfast, vegetarian, dessert, pasta, ...)"
  - name: "sync recipes"
    args: "<tag> [<tag>...]"
    description: "Pull recipes for one or more tags into the local FTS-indexed store"
  - name: "sync articles"
    args: "<vertical> [<subvertical>]"
    description: "Pull article listings for a vertical (or subvertical) into the local store"
  - name: "search"
    args: "<query>"
    description: "Search the local store across recipes and articles (FTS5, offline)"
  - name: "pantry add"
    args: "<ingredient> [<ingredient>...]"
    description: "Add ingredients to your local pantry"
  - name: "pantry list"
    description: "Show your local pantry"
  - name: "pantry remove"
    args: "<ingredient>"
    description: "Remove an ingredient from your pantry"
  - name: "pantry match"
    description: "Find synced recipes whose ingredients match (or mostly match) your pantry"
  - name: "scale"
    args: "<slug-or-url>"
    description: "Scale a recipe's ingredients to a different number of servings (parses recipeYield from the recipe's JSON-LD)"
  - name: "print"
    args: "<slug-or-url>"
    description: "Print a clean cooking-friendly view of a recipe (ingredients + numbered steps, no nav, no images, ready to paste or copy)"
  - name: "open"
    args: "<slug-or-url>"
    description: "Print a Food52 recipe or article URL; pass --launch to actually open it in the default browser"
