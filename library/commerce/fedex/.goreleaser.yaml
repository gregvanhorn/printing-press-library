version: 2
project_name: fedex-pp-cli
changelog:
  disable: true
builds:
  - id: fedex-pp-cli
    main: ./cmd/fedex-pp-cli
    binary: fedex-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/commerce/fedex/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: fedex-pp-mcp
    main: ./cmd/fedex-pp-mcp
    binary: fedex-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: fedex-pp-cli
    repository:
      owner: trevin-chow
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "REST-native CLI for the FedEx Developer API — Ship, Rate, Track, Address Validation, Pickup, Locations, and the rest of the FedEx OAuth2 surface."
    install: |
      bin.install "fedex-pp-cli"
      bin.install "fedex-pp-mcp"
